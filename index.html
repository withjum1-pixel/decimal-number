<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>소수나라 탐험대</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Gowun+Dodum&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#FFF8E7;
    --choco:#5B3A29;
    --raspberry:#E8546B;
    --mint:#4FBBA6;
    --butter:#FFB84C;
    --sky:#4EA5D9;
    --purple:#9B6DD6;
    --card:#FFFFFF;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:
      radial-gradient(circle at 8% 12%, #FFEFC9 0%, transparent 45%),
      radial-gradient(circle at 92% 88%, #FFE1E6 0%, transparent 45%),
      var(--cream);
    font-family:'Gowun Dodum', sans-serif;
    font-size:19px;
    color:var(--choco);
    min-height:100vh;
    padding-bottom:60px;
  }
  h1,h2,h3, .jua{ font-family:'Jua', sans-serif; }
  header{ text-align:center; padding:38px 20px 20px; }
  header .badge{
    display:inline-block; background:var(--raspberry); color:#fff;
    font-family:'Jua',sans-serif; font-size:21px; padding:7px 18px;
    border-radius:999px; margin-bottom:14px; letter-spacing:1px;
  }
  header h1{
    font-size:clamp(35px, 6vw, 51px); margin:0 0 8px; color:var(--choco);
    text-shadow: 3px 3px 0 #FFD9A0;
  }
  header p{ font-size:23px; color:#8a6a52; margin:0; }
  .tabs{ display:flex; justify-content:center; gap:12px; margin:28px auto 8px; flex-wrap:wrap; padding:0 16px; }
  .tab-btn{
    font-family:'Jua', sans-serif; font-size:24px; padding:14px 26px; border-radius:20px;
    border:3px solid var(--choco); background:#fff; color:var(--choco); cursor:pointer;
    box-shadow:0 4px 0 var(--choco); transition:transform .08s ease;
  }
  .tab-btn:hover{ transform:translateY(-2px); }
  .tab-btn:active{ transform:translateY(2px); box-shadow:0 1px 0 var(--choco); }
  .tab-btn.active{ background:var(--raspberry); color:#fff; }
  section.panel{ display:none; max-width:1080px; margin:0 auto; padding:10px 20px 40px; }
  section.panel.active{ display:block; }
  .section-divider{ border:none; border-top:3px dashed var(--choco); opacity:0.25; margin:46px 0; }
  .section-title{ text-align:center; font-size:29px; margin:18px 0 6px; }
  .section-desc{ text-align:center; color:#8a6a52; margin:0 0 26px; font-size:22px; }
  .grid{ display:grid; grid-template-columns:repeat(auto-fit, minmax(230px, 1fr)); gap:22px; }
  .card, .rw-card{
    background:var(--card); border:3px solid var(--choco); border-radius:22px;
    padding:20px 16px 22px; box-shadow:0 6px 0 rgba(91,58,41,0.18); position:relative; overflow:hidden;
  }
  .rw-card{ display:flex; flex-direction:column; align-items:center; gap:14px; }
  .num-tag{
    position:absolute; top:-2px; left:-2px; background:var(--choco); color:#fff;
    font-family:'Jua',sans-serif; font-size:20px; padding:5px 14px 7px 12px; border-bottom-right-radius:14px;
  }
  .shape-wrap{ width:100%; max-width:170px; margin:16px auto 12px; }
  .shape-svg{ width:100%; height:auto; display:block; }
  .numberline-wrap{ width:100%; max-width:260px; margin:14px auto 8px; }
  .prompt-length{ font-family:'Jua', sans-serif; font-size:26px; color:var(--choco); text-align:center; margin:14px 0 4px; }
  .mini-num-input{
    width:70px; height:50px; text-align:center; font-family:'Jua', sans-serif; font-size:24px;
    border:2.5px solid var(--choco); border-radius:10px; background:#FFFDF6; color:var(--choco);
  }
  .mini-num-input:focus{ outline:none; border-color:var(--sky); background:#eaf7ff; }
  .fraction-input{ display:flex; flex-direction:column; align-items:center; gap:4px; margin:6px auto 10px; }
  .fraction-input input{
    width:68px; height:56px; text-align:center; font-family:'Jua', sans-serif; font-size:27px;
    border:2.5px solid var(--choco); border-radius:10px; background:#FFFDF6; color:var(--choco);
  }
  .fraction-input input:focus{ outline:none; border-color:var(--sky); background:#eaf7ff; }
  .frac-bar{ width:70px; border-top:3px solid var(--choco); margin:2px 0; }
  .decimal-input-row{ display:flex; align-items:center; justify-content:center; gap:8px; margin:10px auto 10px; }
  .decimal-input-row input{
    width:62px; height:56px; text-align:center; font-family:'Jua', sans-serif; font-size:27px;
    border:2.5px solid var(--choco); border-radius:10px; background:#FFFDF6; color:var(--choco);
  }
  .decimal-input-row input:focus{ outline:none; border-color:var(--sky); background:#eaf7ff; }
  .decimal-dot{ font-family:'Jua', sans-serif; font-size:34px; color:var(--choco); padding-bottom:6px; }
  .check-btn{
    display:block; margin:8px auto 4px; font-family:'Jua',sans-serif; font-size:21px;
    background:var(--mint); color:#fff; border:none; border-radius:14px; padding:10px 22px;
    cursor:pointer; box-shadow:0 3px 0 #338c7a;
  }
  .check-btn:active{ transform:translateY(2px); box-shadow:0 1px 0 #338c7a; }
  .feedback{ text-align:center; font-family:'Jua', sans-serif; font-size:21px; min-height:28px; margin-top:4px; }
  .feedback.correct{ color:#2f9e6b; }
  .feedback.wrong{ color:var(--raspberry); }
  .stamp{
    position:absolute; top:10px; right:10px; font-family:'Jua',sans-serif; font-size:20px;
    padding:6px 12px; border-radius:10px; transform:rotate(8deg); opacity:0;
    transition:opacity .2s ease; border:2px solid;
  }
  .stamp.show{ opacity:1; }
  .stamp.ok{ color:#2f9e6b; border-color:#2f9e6b; background:#eafff5;}
  .stamp.no{ color:var(--raspberry); border-color:var(--raspberry); background:#fff0f2;}
  .prompt-decimal-display{
    font-family:'Jua', sans-serif; font-size:41px; color:var(--sky); text-align:center; line-height:1.05;
  }
  .bubble{
    background:#FFF3D6; border:2.5px solid var(--butter); border-radius:16px; padding:15px 20px;
    font-family:'Jua', sans-serif; font-size:26px; color:#8a5a12; position:relative; text-align:center;
  }
  .bubble::after{
    content:""; position:absolute; bottom:-12px; left:50%; transform:translateX(-50%);
    border-width:12px 10px 0 10px; border-style:solid; border-color:#FFB84C transparent transparent transparent;
  }
  .read-input{
    width:100%; max-width:280px; padding:13px 15px; font-family:'Gowun Dodum', sans-serif; font-size:24px;
    text-align:center; border:2.5px solid var(--choco); border-radius:12px; background:#FFFDF6; color:var(--choco);
  }
  .read-input:focus{ outline:none; border-color:var(--sky); background:#eaf7ff; }
  .hint-mini{ font-size:17px; color:#a98a6d; }
  .label-mini{ font-size:19px; color:#8a6a52; font-family:'Jua', sans-serif; }
  .controls{ display:flex; justify-content:center; gap:14px; margin-top:32px; flex-wrap:wrap; }
  .big-btn{
    font-family:'Jua', sans-serif; font-size:23px; padding:15px 30px; border-radius:18px;
    border:3px solid var(--choco); cursor:pointer; box-shadow:0 5px 0 var(--choco);
  }
  .big-btn.primary{ background:var(--raspberry); color:#fff; }
  .big-btn.ghost{ background:#fff; color:var(--choco); }
  .big-btn.gold{ background:var(--butter); color:var(--choco); }
  .big-btn:active{ transform:translateY(3px); box-shadow:0 1px 0 var(--choco); }
  .score-board{ text-align:center; font-family:'Jua', sans-serif; font-size:25px; margin-top:18px; color:var(--choco); }
  .score-board span{ color:var(--raspberry); }
  /* ---------- 소수 크기 비교 카드 ---------- */
  .compare-row{ display:flex; align-items:center; justify-content:center; gap:16px; margin:14px 0 4px; flex-wrap:nowrap; }
  .cmp-decimal{ font-family:'Jua',sans-serif; font-size:34px; color:var(--sky); }
  .cmp-buttons{ display:flex; flex-direction:column; gap:8px; }
  .cmp-btn{
    font-family:'Jua',sans-serif; font-size:24px; width:56px; height:46px; border-radius:12px;
    border:2.5px solid var(--choco); background:#fff; color:var(--choco); cursor:pointer;
  }
  .cmp-btn.selected{ background:var(--sky); color:#fff; border-color:var(--sky); }
  .cmp-btn:active{ transform:translateY(2px); }
  /* ---------- Level challenge ---------- */
  .level-progress{ display:flex; justify-content:center; gap:14px; margin:10px 0 18px; flex-wrap:wrap; }
  .level-dot{
    width:48px; height:48px; border-radius:50%; border:3px solid var(--choco);
    display:flex; align-items:center; justify-content:center; font-family:'Jua',sans-serif;
    font-size:21px; background:#fff; color:var(--choco);
  }
  .level-dot.done{ background:var(--mint); color:#fff; }
  .level-dot.current{ background:var(--raspberry); color:#fff; }
  .celebrate-wrap{ text-align:center; padding:30px 10px; }
  .celebrate-medal{ font-size:70px; }
  .celebrate-msg{ font-family:'Jua',sans-serif; font-size:28px; color:var(--choco); margin:10px 0 26px; line-height:1.5; }
  .confetti-layer{ position:fixed; inset:0; pointer-events:none; overflow:hidden; z-index:9999; }
  .confetti-piece{
    position:absolute; top:-20px; opacity:0.9; border-radius:2px;
    animation-name:confetti-fall; animation-timing-function:ease-in; animation-fill-mode:forwards;
  }
  @keyframes confetti-fall{ to{ transform: translateY(110vh) rotate(720deg); opacity:0.5; } }
  .firework-dot{
    position:absolute; border-radius:50%; opacity:1;
    animation: firework-fly 900ms ease-out forwards;
    box-shadow:0 0 6px rgba(0,0,0,0.15);
  }
  @keyframes firework-fly{
    to{ transform: translate(var(--dx), var(--dy)) scale(0.3); opacity:0; }
  }
  @media (prefers-reduced-motion: reduce){ *{ transition:none !important; } }
</style>
</head>
<body>
<header>
  <span class="badge">3학년 소수 첫걸음</span>
  <h1>🔢 소수나라 탐험대</h1>
  <p>그림 속에 숨은 소수를 찾아 함께 탐험해 보아요!</p>
</header>
<div class="tabs">
  <button class="tab-btn active" data-tab="tab1">① 소수 이해하기</button>
  <button class="tab-btn" data-tab="tab2">② 도전! 레벨업</button>
</div>
<!-- ===================== TAB 1 : 소수 이해하기 (통합) ===================== -->
<section class="panel active" id="tab1">
  <h2 class="section-title">🗺️ 색칠한 부분을 소수로 나타내기</h2>
  <p class="section-desc">그림이 똑같이 몇으로 나뉘었는지, 그중 몇 칸이 색칠되었는지 세어서 소수 상자에 써 보세요.</p>
  <div class="grid" id="shapeGrid"></div>
  <div class="score-board" id="scoreBoard1">맞은 개수: <span id="scoreText1">0 / 0</span></div>
  <div class="controls">
    <button class="big-btn primary" onclick="checkAll('shape')">전체 확인하기</button>
    <button class="big-btn ghost" onclick="resetSection('shape')">다시 풀기</button>
  </div>
  <hr class="section-divider">
  <h2 class="section-title">✏️ 소수 읽고 쓰기</h2>
  <p class="section-desc">소수가 보이면 한글로 읽어 쓰고, 읽는 말이 보이면 소수로 써 보세요. ("영점삼", "영 점 삼", "0점3" 모두 정답이에요!)</p>
  <div class="grid" id="rwGrid"></div>
  <div class="score-board" id="scoreBoard2">맞은 개수: <span id="scoreText2">0 / 0</span></div>
  <div class="controls">
    <button class="big-btn primary" onclick="checkAll('rw')">전체 확인하기</button>
    <button class="big-btn ghost" onclick="resetSection('rw')">다시 풀기</button>
  </div>
</section>
<!-- ===================== TAB 2 : LEVEL CHALLENGE ===================== -->
<section class="panel" id="tab2">
  <div id="levelContainer"></div>
</section>
<script>
/* ---------------- 탭 전환 ---------------- */
document.querySelectorAll('.tab-btn').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById(btn.dataset.tab).classList.add('active');
  });
});
/* ---------------- 유틸 ---------------- */
function randInt(min,max){ return Math.floor(Math.random()*(max-min+1))+min; }
function normalize(s){ return (s||'').replace(/\s+/g,'').trim(); }
function sinoKorean(n){
  const digits=['영','일','이','삼','사','오','육','칠','팔','구'];
  if(n<10) return digits[n];
  if(n<100){
    const tens=Math.floor(n/10), ones=n%10;
    let s = tens===1 ? '십' : digits[tens]+'십';
    if(ones>0) s+=digits[ones];
    return s;
  }
  return String(n);
}
function decimalReading(intPart, decPart){ return `${sinoKorean(intPart)} 점 ${sinoKorean(decPart)}`; }
function decimalReadTargets(intPart, decPart){
  const sinoInt = sinoKorean(intPart), sinoDec = sinoKorean(decPart);
  return [
    normalize(`${intPart}점${decPart}`),
    normalize(`${sinoInt}점${sinoDec}`),
    normalize(`${intPart}점${sinoDec}`),
    normalize(`${sinoInt}점${decPart}`),
  ];
}
/* ---------------- SVG 도형 생성 ---------------- */
function renderCircleSVG(n, colored, color){
  const cx=100, cy=100, r=85;
  let slices='';
  for(let k=0;k<n;k++){
    const a1=(-90 + k*360/n)*Math.PI/180;
    const a2=(-90 + (k+1)*360/n)*Math.PI/180;
    const x1=cx+r*Math.cos(a1), y1=cy+r*Math.sin(a1);
    const x2=cx+r*Math.cos(a2), y2=cy+r*Math.sin(a2);
    const largeArc = (360/n) > 180 ? 1 : 0;
    const fill = k<colored ? color : '#ffffff';
    slices += `<path d="M${cx},${cy} L${x1.toFixed(1)},${y1.toFixed(1)} A${r},${r} 0 ${largeArc} 1 ${x2.toFixed(1)},${y2.toFixed(1)} Z" fill="${fill}" stroke="#5B3A29" stroke-width="2.5" stroke-linejoin="round"/>`;
  }
  return `<svg viewBox="0 0 200 200" class="shape-svg">${slices}</svg>`;
}
function renderStripSVG(colored, color){
  const cols=10, cellW=20, cellH=20;
  let cells='';
  for(let c=0;c<cols;c++){
    const fill = c<colored ? color : '#ffffff';
    cells += `<rect x="${c*cellW}" y="0" width="${cellW}" height="${cellH}" fill="${fill}" stroke="#5B3A29" stroke-width="2.5"/>`;
  }
  return `<svg viewBox="0 0 200 20" class="shape-svg">${cells}</svg>`;
}
function renderMultiStripSVG(totalBars, lastColored, color){
  const cols=10, cellW=20, cellH=20, gap=5;
  const totalH = totalBars*cellH + (totalBars-1)*gap;
  let cells='';
  for(let r=0;r<totalBars;r++){
    const rowColored = (r < totalBars-1) ? cols : lastColored;
    const y = r*(cellH+gap);
    for(let c=0;c<cols;c++){
      const fill = c<rowColored ? color : '#ffffff';
      cells += `<rect x="${c*cellW}" y="${y}" width="${cellW}" height="${cellH}" fill="${fill}" stroke="#5B3A29" stroke-width="2.5"/>`;
    }
  }
  return `<svg viewBox="0 0 200 ${totalH}" class="shape-svg">${cells}</svg>`;
}
function renderShapeSvg(p){
  if(p.svgType==='strip10') return renderStripSVG(p.colored, p.color);
  if(p.svgType==='circle10') return renderCircleSVG(10, p.colored, p.color);
  return renderMultiStripSVG(p.totalBars, p.colored, p.color);
}
function renderNumberLineSVG(total, value, color){
  const width=300, marginX=20, y=55;
  const unit = (width-2*marginX)/total;
  let svg = `<svg viewBox="0 0 ${width} 90" class="shape-svg">`;
  svg += `<line x1="${marginX}" y1="${y}" x2="${width-marginX}" y2="${y}" stroke="#5B3A29" stroke-width="3"/>`;
  for(let i=0;i<=total*10;i++){
    const x = marginX + (i/10)*unit;
    if(i%10===0){
      svg += `<line x1="${x.toFixed(1)}" y1="${y-11}" x2="${x.toFixed(1)}" y2="${y+11}" stroke="#5B3A29" stroke-width="3"/>`;
      svg += `<text x="${x.toFixed(1)}" y="${y+27}" font-size="14" text-anchor="middle" fill="#5B3A29" font-family="Jua, sans-serif">${i/10}</text>`;
    }else{
      svg += `<line x1="${x.toFixed(1)}" y1="${y-5}" x2="${x.toFixed(1)}" y2="${y+5}" stroke="#5B3A29" stroke-width="1.5"/>`;
    }
  }
  const endX = marginX + value*unit;
  svg += `<line x1="${marginX}" y1="${y}" x2="${endX.toFixed(1)}" y2="${y}" stroke="${color}" stroke-width="7" stroke-linecap="round"/>`;
  svg += `<polygon points="${(endX-6).toFixed(1)},${y-15} ${(endX+6).toFixed(1)},${y-15} ${endX.toFixed(1)},${y-5}" fill="${color}"/>`;
  svg += `</svg>`;
  return svg;
}
/* ---------------- 소수 이해하기: 색칠한 부분 ---------------- */
const shapeProblems = [
  {svgType:'strip10',  colored:3, color:'#E8546B', intPart:0, decPart:3},
  {svgType:'circle10', colored:7, color:'#4FBBA6', intPart:0, decPart:7},
  {svgType:'strip10',  colored:5, color:'#FFB84C', intPart:0, decPart:5},
  {svgType:'multi', totalBars:2, colored:4, color:'#4EA5D9', intPart:1, decPart:4},
  {svgType:'circle10', colored:2, color:'#9B6DD6', intPart:0, decPart:2},
  {svgType:'strip10',  colored:9, color:'#E8546B', intPart:0, decPart:9},
  {svgType:'multi', totalBars:2, colored:8, color:'#4FBBA6', intPart:1, decPart:8},
  {svgType:'multi', totalBars:3, colored:1, color:'#FFB84C', intPart:2, decPart:1},
];
function buildShapeGrid(){
  const wrap = document.getElementById('shapeGrid');
  wrap.innerHTML='';
  shapeProblems.forEach((p, i)=>{
    const card = document.createElement('div');
    card.className='card';
    card.innerHTML = `
      <span class="num-tag">${i+1}</span>
      <div class="shape-wrap">${renderShapeSvg(p)}</div>
      <div class="decimal-input-row">
        <input type="text" inputmode="numeric" maxlength="1" id="s${i}-int">
        <div class="decimal-dot">.</div>
        <input type="text" inputmode="numeric" maxlength="1" id="s${i}-dec">
      </div>
      <button class="check-btn" onclick="checkShape(${i})">확인</button>
      <div class="feedback" id="s${i}-fb"></div>
      <div class="stamp" id="s${i}-stamp"></div>
    `;
    wrap.appendChild(card);
  });
}
function checkShape(i){
  const p = shapeProblems[i];
  const intEl = document.getElementById(`s${i}-int`);
  const decEl = document.getElementById(`s${i}-dec`);
  const fb = document.getElementById(`s${i}-fb`);
  const stamp = document.getElementById(`s${i}-stamp`);
  const intVal = parseInt(intEl.value, 10);
  const decVal = parseInt(decEl.value, 10);
  const correct = (intVal === p.intPart) && (decVal === p.decPart);
  if(correct){
    fb.textContent = `${p.intPart}.${p.decPart}, 정답이에요! 🎉`;
    fb.className='feedback correct';
    stamp.textContent='정답!'; stamp.className='stamp show ok';
    intEl.style.borderColor='#2f9e6b'; decEl.style.borderColor='#2f9e6b';
  }else{
    fb.textContent = '색칠된 칸 수를 다시 세어 보세요.';
    fb.className='feedback wrong';
    stamp.textContent='다시!'; stamp.className='stamp show no';
    intEl.style.borderColor='#E8546B'; decEl.style.borderColor='#E8546B';
  }
  return correct;
}
/* ---------------- 소수 이해하기: 읽고 쓰기 ---------------- */
const rwProblems = [
  {mode:'write', intPart:0, decPart:3}, {mode:'read',  intPart:2, decPart:4},
  {mode:'write', intPart:1, decPart:5}, {mode:'read',  intPart:0, decPart:6},
  {mode:'write', intPart:3, decPart:7}, {mode:'read',  intPart:4, decPart:2},
  {mode:'write', intPart:0, decPart:8}, {mode:'read',  intPart:5, decPart:9},
];
function buildRwGrid(){
  const wrap = document.getElementById('rwGrid');
  wrap.innerHTML='';
  rwProblems.forEach((p,i)=>{
    const card = document.createElement('div');
    card.className='rw-card';
    if(p.mode==='write'){
      card.innerHTML = `
        <span class="num-tag" style="left:0;top:0;">${i+1}</span>
        <div class="label-mini">이 소수를 읽어 보세요</div>
        <div class="prompt-decimal-display">${p.intPart}.${p.decPart}</div>
        <input type="text" class="read-input" id="r${i}-ans" placeholder="한글 또는 숫자로 읽기">
        <div class="hint-mini">예: 오 점 삼 / 5점3</div>
        <button class="check-btn" onclick="checkRw(${i})">확인</button>
        <div class="feedback" id="r${i}-fb"></div>
        <div class="stamp" id="r${i}-stamp"></div>
      `;
    }else{
      card.innerHTML = `
        <span class="num-tag" style="left:0;top:0;">${i+1}</span>
        <div class="label-mini">이렇게 읽는 소수를 써 보세요</div>
        <div class="bubble">${decimalReading(p.intPart,p.decPart)}</div>
        <div class="decimal-input-row">

function checkRw(i){
  const p = rwProblems[i];
  const fb = document.getElementById(`r${i}-fb`);
  const stamp = document.getElementById(`r${i}-stamp`);
  let correct=false;
  if(p.mode==='write'){
    const ansEl = document.getElementById(`r${i}-ans`);
    const targets = decimalReadTargets(p.intPart, p.decPart);
    const given = normalize(ansEl.value);
    correct = targets.includes(given);
    ansEl.style.borderColor = correct ? '#2f9e6b' : '#E8546B';
  }else{
    const intEl = document.getElementById(`r${i}-int`);
    const decEl = document.getElementById(`r${i}-dec`);
    const intVal = parseInt(intEl.value,10), decVal = parseInt(decEl.value,10);
    correct = (intVal===p.intPart) && (decVal===p.decPart);
    intEl.style.borderColor = correct ? '#2f9e6b' : '#E8546B';
    decEl.style.borderColor = correct ? '#2f9e6b' : '#E8546B';
  }
  if(correct){
    fb.textContent='정답이에요! 🎉'; fb.className='feedback correct';
    stamp.textContent='정답!'; stamp.className='stamp show ok';
  }else{
    fb.textContent = p.mode==='write' ? '힌트: "자연수 점 소수" 순서로, 한글이나 숫자 모두 좋아요.' : '자연수 부분과 소수 부분의 순서를 다시 확인해 보세요.';
    fb.className='feedback wrong';
    stamp.textContent='다시!'; stamp.className='stamp show no';
  }
  return correct;
}

function makeShapeFracDecProblem(){
  const svgType = Math.random()<0.5 ? 'strip10' : 'circle10';
  const colored = randInt(1,9);
  const color = SHAPE_COLORS[randInt(0,SHAPE_COLORS.length-1)];
  return { svgType, colored, color };
}
function makeRwProblem(){
  const intPart = randInt(0,9);
  const decPart = randInt(1,9);
  const mode = Math.random()<0.5 ? 'write' : 'read';
  return { mode, intPart, decPart };
}
function makeNumberlineProblem(){
  const total = 3;
  const intPart = randInt(0,2);
  const decPart = randInt(1,9);
  const color = SHAPE_COLORS[randInt(0,SHAPE_COLORS.length-1)];
  return { total, intPart, decPart, color };
}
function makeLengthProblem(){
  const cm = randInt(1,9), mm = randInt(1,9);
  const type = Math.random()<0.5 ? 'A' : 'B';
  const label = type==='A' ? `${cm} cm ${mm} mm` : `${cm*10+mm} mm`;
  return { type, cm, mm, label };
}
function makeSameIntCompareProblem(){
  const intPart = randInt(0,9);
  let dec1 = randInt(0,9), dec2;
  if(Math.random()<0.15){ dec2 = dec1; }
  else{ do{ dec2 = randInt(0,9); } while(dec2===dec1); }
  const correct = dec1===dec2 ? '=' : (dec1>dec2 ? '>' : '<');
  return { intPart, dec1, dec2, correct, selected:null };
}
function makeGeneralCompareProblem(){
  let int1 = randInt(0,9), dec1 = randInt(0,9), int2, dec2;
  if(Math.random()<0.15){ int2 = int1; dec2 = dec1; }
  else{ do{ int2 = randInt(0,9); dec2 = randInt(0,9); } while(int2===int1 && dec2===dec1); }
  const v1 = int1 + dec1/10, v2 = int2 + dec2/10;
  const correct = v1===v2 ? '=' : (v1>v2 ? '>' : '<');
  return { int1, dec1, int2, dec2, correct, selected:null };
}
function generateLevelQuestions(cfg){
  const qs=[];
  for(let i=0;i<cfg.count;i++){
    if(cfg.kind==='shape-frac-dec'){
      qs.push({ kind:'shape-frac-dec', data: makeShapeFracDecProblem() });
    }else if(cfg.kind==='rw'){
      qs.push({ kind:'rw', data: makeRwProblem() });
    }else if(cfg.kind==='numberline'){
      qs.push({ kind:'numberline', data: makeNumberlineProblem() });
    }else if(cfg.kind==='length'){
      qs.push({ kind:'length', data: makeLengthProblem() });
    }else if(cfg.kind==='same-int-compare'){
      qs.push({ kind:'same-int-compare', data: makeSameIntCompareProblem() });
    }else{
      qs.push({ kind:'general-compare', data: makeGeneralCompareProblem() });
    }
  }
  return qs;
}

function selectCompare(i, val){

  const map = {'>':'gt','=':'eq','<':'lt'};
  document.getElementById(`lv${i}-${map[val]}`).classList.add('selected');
}
function checkLevelQuestion(i){
  const q = levelQuestions[i];
  const fb = document.getElementById(`lv${i}-fb`);
  const stamp = document.getElementById(`lv${i}-stamp`);
  let correct=false;
  if(q.kind==='shape-frac-dec'){
    const p=q.data;
    const numEl=document.getElementById(`lv${i}-num`), denEl=document.getElementById(`lv${i}-den`), decEl=document.getElementById(`lv${i}-dec`);
    const numVal=parseInt(numEl.value,10), denVal=parseInt(denEl.value,10), decVal=parseInt(decEl.value,10);
    correct = (numVal===p.colored) && (denVal===10) && (decVal===p.colored);
    numEl.style.borderColor = correct?'#2f9e6b':'#E8546B';
    denEl.style.borderColor = correct?'#2f9e6b':'#E8546B';
    decEl.style.borderColor = correct?'#2f9e6b':'#E8546B';
  }else if(q.kind==='rw'){
    const p=q.data;
    if(p.mode==='write'){
      const ansEl=document.getElementById(`lv${i}-ans`);
      const targets = decimalReadTargets(p.intPart,p.decPart);
      correct = targets.includes(normalize(ansEl.value));
      ansEl.style.borderColor = correct?'#2f9e6b':'#E8546B';
    }else{
      const intEl=document.getElementById(`lv${i}-int`), decEl=document.getElementById(`lv${i}-dec`);
      const intVal=parseInt(intEl.value,10), decVal=parseInt(decEl.value,10);
      correct = (intVal===p.intPart) && (decVal===p.decPart);
      intEl.style.borderColor = correct?'#2f9e6b':'#E8546B';
      decEl.style.borderColor = correct?'#2f9e6b':'#E8546B';
    }
  }else if(q.kind==='numberline'){
    const p=q.data;
    const intEl=document.getElementById(`lv${i}-int`), decEl=document.getElementById(`lv${i}-dec`), tenthsEl=document.getElementById(`lv${i}-tenths`);
    const intVal=parseInt(intEl.value,10), decVal=parseInt(decEl.value,10), tenthsVal=parseInt(tenthsEl.value,10);
    const expectedTenths = p.intPart*10+p.decPart;
    correct = (intVal===p.intPart) && (decVal===p.decPart) && (tenthsVal===expectedTenths);
    intEl.style.borderColor = correct?'#2f9e6b':'#E8546B';
    decEl.style.borderColor = correct?'#2f9e6b':'#E8546B';
    tenthsEl.style.borderColor = correct?'#2f9e6b':'#E8546B';
  }else if(q.kind==='length'){
    const p=q.data;
    const intEl=document.getElementById(`lv${i}-int`), decEl=document.getElementById(`lv${i}-dec`);
    const intVal=parseInt(intEl.value,10), decVal=parseInt(decEl.value,10);
    correct = (intVal===p.cm) && (decVal===p.mm);
    intEl.style.borderColor = correct?'#2f9e6b':'#E8546B';
    decEl.style.borderColor = correct?'#2f9e6b':'#E8546B';
  }else{
    const p = q.data;
    correct = (p.selected === p.correct);
  }
  if(correct){
    fb.textContent='정답! 🎉'; fb.className='feedback correct';
    stamp.textContent='정답!'; stamp.className='stamp show ok';
  }else{
    fb.textContent='다시 생각해 보세요.'; fb.className='feedback wrong';
    stamp.textContent='다시!'; stamp.className='stamp show no';
  }
  return correct;
}

const FW_COLORS=['#E8546B','#4FBBA6','#FFB84C','#4EA5D9','#9B6DD6','#FFD166','#FF8FA3'];
function spawnConfettiRain(){
  const layer=document.createElement('div');
  layer.className='confetti-layer';
  document.body.appendChild(layer);
  for(let i=0;i<120;i++){
    const piece=document.createElement('div');
    piece.className='confetti-piece';
    piece.style.left = Math.random()*100+'vw';
    piece.style.background = FW_COLORS[randInt(0,FW_COLORS.length-1)];
    piece.style.animationDuration = (2.5+Math.random()*2.2)+'s';
    piece.style.animationDelay = (Math.random()*0.9)+'s';
    piece.style.width = (9+Math.random()*8)+'px';
    piece.style.height = (14+Math.random()*15)+'px';
    layer.appendChild(piece);
  }
  setTimeout(()=>layer.remove(), 5600);
}
function spawnFireworkBurst(cx, cy){
  const layer=document.createElement('div');
  layer.className='confetti-layer';
  document.body.appendChild(layer);
  for(let i=0;i<28;i++){
    const dot=document.createElement('div');
    dot.className='firework-dot';
    const angle = Math.random()*Math.PI*2;
    const dist = 90 + Math.random()*110;
    dot.style.setProperty('--dx', (Math.cos(angle)*dist).toFixed(1)+'px');
    dot.style.setProperty('--dy', (Math.sin(angle)*dist).toFixed(1)+'px');
    dot.style.left = cx+'px';
    dot.style.top = cy+'px';
    dot.style.background = FW_COLORS[randInt(0,FW_COLORS.length-1)];
    const s = (10+Math.random()*8);
    dot.style.width = s+'px';
    dot.style.height = s+'px';
    layer.appendChild(dot);
  }
  setTimeout(()=>layer.remove(), 1100);
}
function launchConfetti(){
  spawnConfettiRain();
  const burstCount = 6;
  for(let b=0;b<burstCount;b++){
    setTimeout(()=>{
      const x = window.innerWidth * (0.12 + Math.random()*0.76);
      const y = window.innerHeight * (0.15 + Math.random()*0.4);
      spawnFireworkBurst(x, y);
    }, b*320);
  }
}
/* ---------------- 초기화 ---------------- */
buildShapeGrid();
buildRwGrid();
levelQuestions = generateLevelQuestions(levelConfig[0]);
renderLevelPanel();
